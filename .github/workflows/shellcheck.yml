name: shellcheck

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-render:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y shellcheck jq curl python3

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install shellcheck jq

      - name: Validate plugin metadata
        run: |
          jq -e . .claude-plugin/plugin.json
          jq -e . .claude-plugin/marketplace.json
          test "$(jq -r .version .claude-plugin/plugin.json)" \
             = "$(jq -r .plugins[0].version .claude-plugin/marketplace.json)"

      - name: Shellcheck
        run: |
          shellcheck --severity=warning \
            scripts/statusline-command.sh \
            scripts/statusline-config.sample.sh \
            tests/install-uninstall.sh

      - name: Render fixture (detail mode)
        run: |
          cat scripts/preview-fixture.json | bash scripts/statusline-command.sh
          echo

      - name: Render fixture (minimal mode via env override)
        run: |
          out=$(cat scripts/preview-fixture.json \
            | CLAUDE_STATUSLINE_FORCE_MODE=minimal bash scripts/statusline-command.sh)
          echo "$out"
          lines=$(echo "$out" | wc -l)
          test "$lines" -eq 2 || { echo "FAIL: minimal mode produced $lines lines, expected 2"; exit 1; }

      - name: Render no-rate-limits fixture (non-claude.ai user)
        run: |
          out=$(cat scripts/preview-fixture-no-rate-limits.json | bash scripts/statusline-command.sh)
          echo "$out"
          # Must NOT contain 5h: or 7d: rows
          if echo "$out" | grep -qE '(5h:|7d:)'; then
            echo "FAIL: rate-limit row appeared for fixture without rate_limits"
            exit 1
          fi
          echo "PASS"

      - name: Cost-omission rule (both keys unset)
        run: |
          unset ANTHROPIC_ADMIN_API_KEY ANTHOROPIC_ADMIN_API_KEY OPENAI_ADMIN_API_KEY
          out=$(cat scripts/preview-fixture.json | bash scripts/statusline-command.sh)
          if echo "$out" | grep -qE '(ant:|oai:)'; then
            echo "FAIL: cost slot appeared with no admin keys set"
            exit 1
          fi
          echo "PASS"

      - name: Toggle flag-file path (minimal via flag, not env)
        run: |
          mkdir -p ~/.claude/cache
          : > ~/.claude/cache/statusline-minimal
          out=$(cat scripts/preview-fixture.json | bash scripts/statusline-command.sh)
          echo "$out"
          lines=$(echo "$out" | wc -l)
          test "$lines" -eq 2 || { echo "FAIL: flag-file minimal mode produced $lines lines, expected 2"; exit 1; }
          rm -f ~/.claude/cache/statusline-minimal
          out=$(cat scripts/preview-fixture.json | bash scripts/statusline-command.sh)
          lines=$(echo "$out" | wc -l)
          test "$lines" -gt 2 || { echo "FAIL: flag absent should produce >2 lines, got $lines"; exit 1; }
          echo "PASS"

      - name: Install/uninstall sandbox (round-trip)
        run: |
          bash tests/install-uninstall.sh
